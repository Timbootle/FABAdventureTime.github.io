name: Auto fetch & optimize images

on:
  schedule:
    - cron: '0 3 * * *'    # daily at 03:00 UTC — adjust as needed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # we'll set credentials with token below

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick wget

      - name: Run image fetch script
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 scripts/fetch_images.py images/sources.json

      - name: Commit and push images using token
        env:
          REPO_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          git config user.name "automation-bot"
          git config user.email "automation-bot@users.noreply.github.com"
          git add images/
          git commit -m "Automated: add/refresh optimized images" || echo "No changes to commit"
          # Use token for push to avoid relying on the default GITHUB_TOKEN
          git remote set-url origin https://x-access-token:${REPO_TOKEN}@github.com/${{ github.repository }}
          git push origin HEAD:main
