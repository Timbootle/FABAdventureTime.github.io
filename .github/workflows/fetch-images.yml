name: Fetch and optimize images

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick wget

      - name: Run image fetch script
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python3 scripts/fetch_images.py images/sources.json

      - name: Commit and push images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "Add optimized images fetched from Unsplash/Pexels/Pixabay" || echo "No changes to commit"
          git push
